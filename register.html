<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Eventra</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="main.css" />
    <!--link to javascript files here-->
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">Eventra</a>
        <ul class="nav-links">
          <li><a href="products.html">Products</a></li>
          <li><a href="cart.html">Cart (0)</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="admin.html">Admin</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <h1>Register / Login</h1>
      <div id="register-container" class="register-wrapper">
        <form id="registerForm" class="register-form">
          <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" id="fname" required />
          </div>
          <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required />
          </div>
          <div class="button-group">
            <button type="submit">Register</button>
            <button type="submit" id="loginBtn">Login</button>
          </div>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2024 Eventra. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/register.js"></script>
  </body>
</html>
