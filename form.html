<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="form-container">
        <form class="form-component">
            <div class="input-component">
                <label class="label-form" for="firstname">First Name</label>
                <input class="input-form" type="text" id="firstname" placeholder="Addo"> 
            </div>
            <div class="input-component">
                <label class="label-form" for="lastname">Last name</label>
                <input class="input-form" type="text" id="lastname" placeholder="Goitom">
            </div>
            <div class="input-component">
                <label class="label-form" for="email">Email</label>
                <input class="input-form" type="text" id="email" placeholder="addo@gmail.com">
            </div>
            <div class="input-component">
                <label class="label-form" for="textarea">Message</label>
                <textarea class="textarea-form" name="textarea" id="textarea" placeholder="Write a message" rows="4" cols="16"></textarea>
            </div>
            <div class="button-component">
                <button class="button-form">Book now</button>
            </div>
        </form>
    </div>
    
</body>
</html>
