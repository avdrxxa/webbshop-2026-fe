<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customerprofile.css">
</head>
<body>
    <div class="container-customer-profile">
        <div class="button-customer-profile">
            <button class="button-edit-customer-profile">
                EDIT
            </button>
            <button class="button-logout-customer-profile">
                LOG OUT
            </button>
        </div>
        <div class="profile-customer-profile">
            <h1 class="h1-customer-profile">PROFILE</h1>
            <img class="img-customer-profile" src="./src/assets/profile-picture.avif" alt="A picture of a woman">
            <form class="form-customer-profile">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="ADDO GOITOM">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="ADDO@GMAIL.COM">
                <label for="phone">Number</label>
                <input type="tel" id="phone" placeholder="076 0000 000">
                <label for="location">Location</label>
                <input type="text" id="location" placeholder="NEW YORK">
            </form>
        </div>
    </div>
</body>
</html>
