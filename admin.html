<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Hakim Livs</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  <body>
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">Hakim Livs</a>
        <ul class="nav-links">
          <li><a href="products.html">Products</a></li>
          <li><a href="cart.html">Cart (0)</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="admin.html">Admin</a></li>
        </ul>
      </nav>
    </header>

    <main class="admin-main">
      <h1>Lägg till event</h1>

      <form id="createProductForm" class="admin-create-event">
        <div class="admin-form-row">
          <label for="title">Titel</label>
          <input type="text" id="title" required />
        </div>
        <div class="admin-form-row">
          <label for="datum">Datum</label>
          <input type="date" id="datum" required />
        </div>
        <div class="admin-form-row">
          <label for="time">Tid</label>
          <input type="time" id="time" required />
        </div>
        <div class="admin-form-row">
          <label for="MaxParticipant">Max antal deltagare</label>
          <input type="number" id="MaxParticipant" min="1" required />
        </div>
        <div class="admin-form-row">
          <label for="trainer">Trainer</label>
          <input type="text" id="trainer" required />
        </div>
        <div class="admin-form-row">
          <label for="image">Ladda upp bild</label>
          <input type="url" id="image" required />
        </div>
        <div class="admin-form-row">
          <label for="slug">Slug</label>
          <input type="text" id="slug" required placeholder="e.g. yoga-class" />
        </div>
        <button type="submit">Upload</button>
      </form>

      <h2>Deltagarlista</h2>
      <div class="admin-table-wrap">
      </div>

    <h2>Arkiv</h2>
      <div class="admin-table-wrap">
      </div>


      <h2>Kundregister</h2>
      <div class="admin-table-wrap">
      </div>
    </main>
 <!-- FOOTER -->

          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <a href="/terms">Terms</a>
        </div>
        <div class="sociala">
          <a href="https://www.instagram.com/" target="_blank"><img src="images/insta.svg" alt="instagram icon"></a>
          <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook.svg" alt="facebook icon"></a>
          <a href="https://www.youtube.com" target="_blank" ><img src="images/youtube.svg" alt="youtube icon"></a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
