<!DOCTYPE html>

  <head>

    <title>Eventera</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href='main.css'/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Actor&family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  </head>
<body>

    <!-- HEADER -->
    <header class="site-header">
      <nav class="desktop">
        <a href="index.html" class="logo">Eventra</a>
        <ul class="nav-links">
          <li><a href="products.html">Events</a></li>
          <li><a href="register.html">Login</a></li>
          <li><a href="profile.html"><img src="images/profile.svg" alt="profile icon" width="20px"></a></li>
        </ul>
      </nav>
      <nav class="mobil">
        <a href="index.html" class="logo">Eventra</a>
        <div class="dropdown"><img src="images/meny.svg" alt="meny icon">
            <ul class="dropdown-list">
              <li><a href="products.html">Events</a></li>
              <li><a href="register.html">Login</a></li>
              <li><a class="last" href="profile.html">Profile</a></li>

          <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook.svg" alt="facebook icon"></a>
          <a href="https://www.youtube.com" target="_blank" ><img src="images/youtube.svg" alt="youtube icon"></a>
