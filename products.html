<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventra | events</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="products.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="loggaut.js" defer></script>
    <script type="module" src="products.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Actor&family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <nav class="desktop">
        <a href="index.html" class="logo">Eventra</a>
        <ul class="nav-links">
          <li><a href="products.html">Events</a></li>
          <li><a class="loggautBtn" href="register.html">Login</a></li>
          <li>
            <a class="profilBtn"
              ><img src="images/profile.svg" alt="profile icon" width="20px"
            /></a>
          </li>
        </ul>
      </nav>
      <nav class="mobil">
        <a href="index.html" class="logo">Eventra</a>
        <div class="dropdown">
          <img src="images/meny.svg" alt="meny icon" />
          <ul class="dropdown-list">
            <li><a class="utgrått" href="products.html">Events</a></li>
            <li><a class="loggautBtn" href="register.html">Login</a></li>
            <li><a class="profilBtn">Profile</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- MAIN CONTENT -->

    <section class="hero">
      <p>What are you looking for?</p>
      <div class="filtrera">
        <input class="search-bar" type="text" />
        <img
          class="absolute"
          src="images/search glass.svg"
          alt="search glass"
        />
      </div>
    </section>

    <main class="main-content">
      <div class="flex1">
        <h2>Featured events</h2>
        <div>
          <img class="iconFilter" src="images/filtrera.svg" alt="filter icon" />
        </div>
        <div class="filter-form desktop">
          <label for="date"
            >Date
            <input type="date" name="date" id="date" />
          </label>
          <label for="category"
            >Category
            <select name="kategory" id="category">
              <option value="all">All</option>
              <option value="gym">Gym</option>
              <option value="spa">Spa</option>
              <option value="yoga">Yoga</option>
              <option value="outdoor">Outdoor</option>
              <option value="pilates">Pilates</option>
              <option value="meditation">Meditation</option>
            </select>
          </label>
          <button class="submit">Submit</button>
        </div>
      </div>
      <div id="events"></div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <h2>Eventra</h2>
        <p>&copy; 2024 Eventra. All rights reserved.</p>
        <div class="footer-links">
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
          <a href="terms.html">Terms</a>
        </div>
        <div class="sociala">
          <a href="https://www.instagram.com/" target="_blank"
            ><img src="images/insta.svg" alt="instagram icon"
          /></a>
          <a href="https://www.facebook.com/" target="_blank"
            ><img src="images/facebook.svg" alt="facebook icon"
          /></a>
          <a href="https://www.youtube.com" target="_blank"
            ><img src="images/youtube.svg" alt="youtube icon"
          /></a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
